# HTTPS 扩展：在 docker-compose.yml 基础上启用 SSL
# 使用方式：docker compose -f docker-compose.yml -f deploy/docker-compose.https.yml up -d
# 前置条件：已运行 deploy/ssl-setup.sh 获取证书

services:
  frontend:
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot
      - ./deploy/nginx-ssl.conf:/etc/nginx/conf.d/default.conf:ro
    command: /bin/sh -c "nginx -g 'daemon off;'"

volumes:
  certbot_conf:
  certbot_www:
