# 无域名时用自签名证书（证书由 frontend/scripts/generate-self-signed-cert.js 生成到 deploy/certs/）
# 使用方式：
#   1. 本地执行 node frontend/scripts/generate-self-signed-cert.js
#   2. 上传 deploy/certs/ 到服务器
#   3. 执行：docker compose -f docker-compose.yml -f deploy/docker-compose.https-self-signed.yml up -d frontend

services:
  frontend:
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/certs:/etc/ssl/elderlycare:ro
      - ./deploy/nginx-ssl-aliyun.conf:/etc/nginx/conf.d/default.conf:ro
    command: /bin/sh -c "nginx -g 'daemon off;'"
