# HTTPS 配置，证书路径中的域名需与下方 server_name 一致
# 使用 nip.io 免费域名：47.111.26.171.nip.io 自动解析到 47.111.26.171

server {
    listen 80;
    server_name _;
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name 47.111.26.171.nip.io;
    root /usr/share/nginx/html;
    index index.html;

    ssl_certificate /etc/letsencrypt/live/47.111.26.171.nip.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/47.111.26.171.nip.io/privkey.pem;
    ssl_session_timeout 1d;
    ssl_protocols TLSv1.2 TLSv1.3;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://backend:8000;
        proxy_connect_timeout 30s;
        proxy_read_timeout 30s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /admin/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
    }

    location /media/ {
        proxy_pass http://backend:8000;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
}
